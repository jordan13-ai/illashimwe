# ============================================================
# Illashimwe Adventure — Nginx Production Config
# For: Next.js Static Export (output: "export", trailingSlash: true)
# Tested on: Ubuntu 20.04/22.04, Nginx 1.18+
# ============================================================
# USAGE:
#   sudo cp nginx.conf /etc/nginx/sites-available/illashimweadventures.com
#   sudo ln -s /etc/nginx/sites-available/illashimweadventures.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ─────────────────────────────────────────────
# HTTP → HTTPS REDIRECT
# ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name illashimweadventures.com www.illashimweadventures.com;

    # Uncomment after SSL certificate is installed:
    # return 301 https://$host$request_uri;

    # Temporary: serve HTTP until SSL is ready
    include /etc/nginx/sites-available/illashimweadventures.com_shared;
}

# ─────────────────────────────────────────────
# HTTPS (SSL/TLS)
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name illashimweadventures.com www.illashimweadventures.com;

    # SSL Certificates (Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/illashimweadventures.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/illashimweadventures.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    include /etc/nginx/sites-available/illashimweadventures.com_shared;
}

# ─────────────────────────────────────────────
# WWW → Non-WWW Canonical Redirect
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.illashimweadventures.com;
    ssl_certificate     /etc/letsencrypt/live/illashimweadventures.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/illashimweadventures.com/privkey.pem;
    return 301 https://illashimweadventures.com$request_uri;
}
