# ============================================================
# Illashimwe Adventure — Nginx Shared Server Block Config
# Save as: /etc/nginx/sites-available/illashimweadventures.com_shared
# This file is included by both the HTTP and HTTPS server blocks.
# ============================================================

root  /var/www/illashimweadventures.com;  # ← Change to your upload folder
index index.html;

# Hide server version
server_tokens off;
# No directory listing
autoindex off;

# ─────────────────────────────────────────────
# GZIP COMPRESSION
# ─────────────────────────────────────────────
gzip              on;
gzip_vary         on;
gzip_min_length   1024;
gzip_comp_level   6;
gzip_proxied      any;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

# ─────────────────────────────────────────────
# SECURITY HEADERS (applied to all responses)
# ─────────────────────────────────────────────
add_header X-Content-Type-Options     "nosniff"                          always;
add_header X-Frame-Options            "DENY"                             always;
add_header X-XSS-Protection           "1; mode=block"                    always;
add_header Referrer-Policy            "strict-origin-when-cross-origin"  always;
add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
add_header Content-Security-Policy
    "default-src 'self'; \
     script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; \
     style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
     font-src 'self' https://fonts.gstatic.com; \
     img-src 'self' data: https: blob:; \
     connect-src 'self' https://www.google-analytics.com; \
     frame-ancestors 'none';"
    always;

# ─────────────────────────────────────────────
# CANONICAL REDIRECTS
# ─────────────────────────────────────────────

# Redirect /faqs → /faq/ (duplicate page elimination)
location = /faqs  { return 301 /faq/; }
location = /faqs/ { return 301 /faq/; }

# ─────────────────────────────────────────────
# BLOCK SENSITIVE FILES
# ─────────────────────────────────────────────
location ~* \.(env|json|lock|gitignore)$ {
    deny all;
    return 404;
}
# Block Next.js source/config files accidentally uploaded
location ~* (next\.config\.(ts|js)|tsconfig\.json|package\.json)$ {
    deny all;
    return 404;
}

# ─────────────────────────────────────────────
# CACHING — _next/static (hashed, 1 year immutable)
# ─────────────────────────────────────────────
location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# ─────────────────────────────────────────────
# CACHING — Static Assets (images, fonts)
# ─────────────────────────────────────────────
location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff|woff2|otf|ttf)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# CSS and JS bundles
location ~* \.(css|js)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# ─────────────────────────────────────────────
# CACHING — HTML Pages (1 hour, revalidate)
# ─────────────────────────────────────────────
location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
}

# ─────────────────────────────────────────────
# CACHING — Sitemap / Robots
# ─────────────────────────────────────────────
location ~* \.(xml|txt)$ {
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

# ─────────────────────────────────────────────
# MAIN ROUTING — Next.js static export with trailingSlash: true
# Route structure: /about/ → /about/index.html
# ─────────────────────────────────────────────
location / {
    # Try exact file → directory index → 404 fallback
    try_files $uri $uri/ $uri/index.html $uri.html =404;
}

# ─────────────────────────────────────────────
# CUSTOM ERROR PAGE
# ─────────────────────────────────────────────
error_page 404 /404.html;
location = /404.html {
    internal;
}
